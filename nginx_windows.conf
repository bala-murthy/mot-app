# =============================================================================
# MOT Nexus – nginx reverse-proxy config for Windows
# =============================================================================
# SETUP:
#   1. Download nginx for Windows: https://nginx.org/en/download.html
#      (Get the Stable version, e.g. nginx-1.26.x.zip)
#   2. Extract to C:\nginx
#   3. Replace C:\nginx\conf\nginx.conf with this file  (or include it)
#   4. Start nginx:   cd C:\nginx && start nginx
#   5. Reload config: cd C:\nginx && nginx -s reload
#   6. Stop nginx:    cd C:\nginx && nginx -s stop
#
# After this, users reach MOT Nexus on http://mot-server/ (port 80)
# and you can close port 8000 in the firewall (nginx handles all traffic).
# =============================================================================

worker_processes  1;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  256;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── MOT Nexus upstream ────────────────────────────────────────────────────
    upstream mot_nexus {
        server 127.0.0.1:8000;
    }

    server {
        listen       80;

        # Change this to your server's hostname or IP.
        # Use '_' to accept any hostname (simplest option for internal networks).
        server_name  _;

        # Allow large file uploads (Excel files can be big)
        client_max_body_size  100M;

        # Generous timeouts for slow uploads/downloads
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        location / {
            proxy_pass         http://mot_nexus;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
